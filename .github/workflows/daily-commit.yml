name: 23f2002019@ds.study.iitm.ac.in

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Daily update
        run: |
          echo "Last run: $(date -u)" >> daily-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-status.txt
          git commit -m "chore: daily status update $(date -u)"

      - name: Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push
