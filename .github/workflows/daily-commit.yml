name: Daily Commit 23f2002019@ds.study.iitm.ac.in

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add daily update file for 23f2002019@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date -u)" > daily-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-status.txt
          git commit -m "chore: daily status update" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push

