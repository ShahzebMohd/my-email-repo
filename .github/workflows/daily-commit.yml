name: Daily Commit 23f2002019@ds.study.iitm.ac.in

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # allow commits with GITHUB_TOKEN [web:160][web:202]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add daily update file for 23f2002019@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date -u)" >> daily-status.txt
          echo "Run ID: ${GITHUB_RUN_ID}" >> daily-status.txt
          echo "----" >> daily-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-status.txt
          git commit -m "chore: daily status update $(date -u)"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push
